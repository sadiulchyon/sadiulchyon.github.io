- title: Research Experience
  type: time_table
  contents:
    - title: "Research Assistant (Advisor: Dr. Jim Best)"
      institution: Department of Geography & GIS, University of Illinois Urbana-Champaign
      year: "2021 - "
      description:
        - Quantified multi-decadal sediment extraction and land-water change using Landsat and Sentinel-2 time series in Google Earth Engine and machine-learning workflows to support river-system analysis and watershed-scale decision making.
        - Developed reproducible geospatial workflows and shareable code repositories for Google Earth Engine analysis, satellite-data acquisition, river-change monitoring, and GIS/remote-sensing teaching materials.
        - Estimated geomorphic disturbance and recovery from gravel mining using remote sensing and field-informed methods; characterized grain-size distributions and sediment budget components from field surveys and pit volume analysis to constrain extraction rates relative to natural sediment supply.
        - Diagnosed community and land-use impacts of aggregate extraction using mixed-methods fieldwork with riverine stakeholders to inform community-centered watershed planning.
        - Built a spatial AI pipeline using YOLO26, PyTorch, GPU-enabled model training, and high-resolution Planet imagery to detect sediment-transport vessels and generate spatio-temporal extraction-intensity metrics.
        - Translated socio-ecological evidence into governance and restoration recommendations.
    - title: "Research Assistant (Advisor: Dr. M. Shahjahan Mondal)"
      institution: Institute of Water and Flood Management, BUET
      year: "2019 - 2021"
      description:
        - Developed a calibrated HEC-HMS hydrologic model and coupled HEC-RAS 1D/2D hydraulic model for the Arial Khan floodplain to assess flood hazard, exposure, and vulnerability under climate and socioeconomic scenarios.
        - Validated model outputs using observed hydrologic data and spatial flood evidence, producing applied flood-risk maps for water-resources planning and climate-risk assessment.
    - title: "Undergraduate Student (Advisor: Dr. Ataur Rahman)"
      institution: Department of Water Resources Engineering, BUET
      year: "2014 - 2015"
      description:
        - Conducted a controlled flume study of horizontal slotted submerged breakwaters, evaluating hydraulic performance coefficients.

