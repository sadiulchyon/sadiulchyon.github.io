# _config.yml — master configuration file for the Jekyll site.
# Changes here affect the entire site. Restart the local server after editing.
# Sections:
#   1.  Site settings         — name, URL, description, favicon
#   2.  Theme                 — code highlight & repo card color schemes
#   3.  RSS Feed              — RSS toggle
#   4.  Layout                — navbar/footer behaviour, page width
#   5.  Open Graph            — social media preview cards
#   6.  Social integration    — profile links shown in navbar & footer
#   7.  Analytics             — Google Analytics, search console verification
#   8.  Blog                  — blog name, pagination, comments, external feeds
#   9.  Collections           — Jekyll collections (news, projects)
#   10. Jekyll settings       — markdown, plugins, include/exclude paths
#   11. Jekyll Minifier       — HTML/CSS/JS minification on build
#   12. Jekyll Archives       — blog archive pages by year/tag/category
#   13. Jekyll Scholar        — academic publications & citation formatting
#   14. Responsive WebP Images— auto-generate optimised images via ImageMagick
#   15. Jekyll Diagrams       — diagram rendering (optional)
#   16. Optional Features     — toggle site features on/off
#   17. Library versions      — pinned CDN versions for Bootstrap, jQuery, etc.
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# 1. Site settings
# -----------------------------------------------------------------------------
# Core identity of the site: your name, URL, description, and favicon.

title: Sadiul Chyon # the website title (if blank, full name will be used instead)
first_name: Md Sadiul Alam
middle_name: 
last_name: Chyon
# email: chyon.msa@gmail.com
description: > # the ">" symbol means to ignore newlines until "footer_text:"
  A simple, whitespace theme for academics. Based on [*folio](https://github.com/bogoli/-folio) design.
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
  Hosted by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.
keywords: biorhythms, chronobiology, macroecology, shorebirds  # add your own keywords or leave empty

lang: en # the language of your site (for example: en, fr, cn, ru, etc.)
icon: favicon_white.ico #⚛️ the emoji used as the favicon (alternatively, provide image name in /assets/img/)

url: https://sadiulchyon.github.io # the base hostname & protocol for your site
baseurl: # the subpath of your site, e.g. /blog/
last_updated: true # set to true if you want to display last updated in the footer
impressum_path:  # set to path to include impressum link in the footer, use the same path as permalink in a page, helps to conform with EU GDPR

# -----------------------------------------------------------------------------
# 2. Theme
# -----------------------------------------------------------------------------
# Color schemes for code blocks and GitHub repo cards (light & dark mode).

# code highlighter theme
highlight_theme_light: github   # https://github.com/jwarby/jekyll-pygments-themes
highlight_theme_dark: native    # https://github.com/jwarby/jekyll-pygments-themes

# repo color theme
repo_theme_light: default       # https://github.com/anuraghazra/github-readme-stats/blob/master/themes/README.md
repo_theme_dark: dark           # https://github.com/anuraghazra/github-readme-stats/blob/master/themes/README.md

# -----------------------------------------------------------------------------
# 3. RSS Feed
# -----------------------------------------------------------------------------
# Set rss_icon: true to show an RSS icon in the footer.
# Uses the site title and URL. See https://github.com/jekyll/jekyll-feed for more.

rss_icon: false

# -----------------------------------------------------------------------------
# 4. Layout
# -----------------------------------------------------------------------------
# Controls navbar/footer stickiness and the maximum content width.

navbar_fixed: true
footer_fixed: true

# Dimensions
max_width: 800px

# TODO: add layout settings (single page vs. multi-page)

# -----------------------------------------------------------------------------
# 5. Open Graph & Schema.org
# -----------------------------------------------------------------------------
# Controls rich preview cards when your pages are shared on social media.
# Set serve_og_meta: true and provide og_image to enable link previews.
serve_og_meta: false # Include Open Graph meta tags in the HTML head
serve_schema_org: false # Include Schema.org in the HTML head
og_image: # The site-wide (default for all links) Open Graph preview image

# -----------------------------------------------------------------------------
# 6. Social integration
# -----------------------------------------------------------------------------
# Fill in your usernames/IDs to display social icons in the navbar and footer.
# Leave blank to hide. Filled entries appear automatically — no other changes needed.

# --- Academic ---
scholar_userid: tzGlZCkAAAAJ&hl=en&oi=ao # your Google Scholar ID
semanticscholar_id: # your Semantic Scholar ID
orcid_id: 0009-0006-4509-8058 # your ORCID ID
publons_id: # your ID on Publons
research_gate_profile: # your profile on ResearchGate
dblp_url: # your DBLP profile url

# --- Developer ---
github_username: sadiulchyon # your GitHub user name
gitlab_username: # your GitLab user name
stackoverflow_id: # your stackoverflow id
kaggle_id: # your kaggle id

# --- Social media ---
twitter_username: # your Twitter handle
linkedin_username: # your LinkedIn user name
instagram_id: # your instagram id
facebook_id: Saadi.Chayon # your facebook id
discord_id: # your discord id (18-digit unique numerical identifier)

# --- Other ---
medium_username: # your Medium username
quora_username: # your Quora username
blogger_url: # your blogger URL
work_url: # work page URL
keybase_username: # your keybase user name
wikidata_id: # your wikidata id
lastfm_id: # your lastfm id
spotify_id: # your spotify id
pinterest_id: # your pinterest id
unsplash_id: # your unsplash id

contact_note: > #You can even add a little note about which of these is the best way to reach you.

# -----------------------------------------------------------------------------
# 7. Analytics and search engine verification
# -----------------------------------------------------------------------------
# Add your IDs to enable tracking. Toggle each on/off in section 16 below.

google_analytics:  # your Goole Analytics measurement ID (format: G-XXXXXXXXXX)
panelbear_analytics:  # panelbear analytics site ID (format: XXXXXXXXX)

google_site_verification:  # your google-site-verification ID (Google Search Console)
bing_site_verification:  # out your bing-site-verification ID (Bing Webmaster)

# -----------------------------------------------------------------------------
# 8. Blog
# -----------------------------------------------------------------------------
# Controls the blog page title, URL format, pagination, comments, and external feeds.

blog_name: random thoughts # blog_name will be displayed in your blog page
blog_nav_title: blog # your blog must have a title for it to be displayed in the nav bar
blog_description: on science and beyond
permalink: /blog/:year/:title/

# Pagination
pagination:
  enabled: true

# Comments
disqus_shortname: martinbulla # put your disqus shortname
# https://help.disqus.com/en/articles/1717111-what-s-a-shortname

# External sources.
# If you have blog posts published on medium.com or other exteranl sources,
# you can display them in your blog by adding a link to the RSS feed.
external_sources:
  - name: medium.com
    rss_url: https://medium.com/@al-folio/feed

# -----------------------------------------------------------------------------
# 9. Collections
# -----------------------------------------------------------------------------
# Jekyll collections let you group related content (news, projects).
# Each collection gets its own folder (e.g. _news/, _projects/) and permalink.

collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/

news_scrollable: true # adds a vertical scroll bar if there are more than 3 news items
news_limit: 5 # leave blank to include all the news in the `_news` folder

# -----------------------------------------------------------------------------
# 10. Jekyll settings
# -----------------------------------------------------------------------------
# Core Jekyll configuration: markdown parser, syntax highlighting,
# which folders to include/exclude from the build, and active plugins.

# Markdown and syntax highlight
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

# Includes & excludes
include: ['_pages']
exclude:
  - bin
  - Gemfile
  - Gemfile.lock
  - vendor
keep_files:
  - CNAME
  - .nojekyll
  - .git

# Plug-ins
plugins:
  - jekyll-archives
  - jekyll-diagrams
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-imagemagick
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-target-blank
  - jekyll-twitter-plugin
  - jemoji

# Sitemap settings
defaults:
  - scope:
      path: "assets/**/*.*"
    values:
      sitemap: false

# -----------------------------------------------------------------------------
# 11. Jekyll Minifier
# -----------------------------------------------------------------------------
# Automatically minifies HTML, CSS, and JS on build to reduce page load times.

jekyll-minifier:
  exclude: ['robots.txt']
  uglifier_args:
    harmony: true

# -----------------------------------------------------------------------------
# 12. Jekyll Archives
# -----------------------------------------------------------------------------
# Generates archive pages for blog posts grouped by year, tag, and category.

jekyll-archives:
  enabled: [year, tags, categories] # enables year, tag and category archives (remove if you need to disable one of them).
  layouts:
    year: archive-year
    tag: archive-tag
    category: archive-category
  permalinks:
    year: '/blog/:year/'
    tag: '/blog/tag/:name/'
    category: '/blog/category/:name/'

display_tags: ['formatting', 'images', 'links', 'math', 'code'] # this tags will be dispalyed on the front page of your blog

# -----------------------------------------------------------------------------
# 13. Jekyll Scholar
# -----------------------------------------------------------------------------
# Renders your publications from a BibTeX file (_bibliography/papers.bib).
# Your name is highlighted automatically in author lists.

scholar:

  last_name: [Chyon]
  first_name: [Md Sadiul Alam]

  style: apa
  locale: en

  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  # Note: if you have latex math in your bibtex, the latex filter
  # preprocessing may conflict with MathJAX if the latter is enabled.
  # See https://github.com/alshedivat/al-folio/issues/357.
  bibtex_filters: [latex, smallcaps, superscript]

  replace_strings: true
  join_strings: true

  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details

  query: "@*"

# Filter out certain bibtex entry keywords used internally from the bib output
filtered_bibtex_keywords: [abbr, abstract, arxiv, bibtex_show, html, pdf, selected, supp, blog, code, poster, slides, website, preview]

# Maximum number of authors to be shown for each publication (more authors are visible on click)
max_author_limit: 20  # leave blank to always show all authors
more_authors_animation_delay: 10  # more authors are revealed on click using animation; smaller delay means faster animation


# -----------------------------------------------------------------------------
# 14. Responsive WebP Images
# -----------------------------------------------------------------------------
# Auto-converts images in assets/img/ to WebP and resizes them on build.
# Disable (enabled: false) if ImageMagick is not installed locally.

imagemagick:
  enabled: true # enables responsive images for your site (recomended, see https://github.com/alshedivat/al-folio/issues/537)
  widths:
    - 480
    - 800
    - 1400
  input_directories:
    - assets/img/
  input_formats:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".tiff"
  output_formats:
    webp: "-resize 800x"

# -----------------------------------------------------------------------------
# 15. Jekyll Diagrams
# -----------------------------------------------------------------------------
# Renders diagrams (Mermaid, Graphviz, etc.) in posts and pages. Optional.

jekyll-diagrams:
    # configuration, see https://github.com/zhustec/jekyll-diagrams.
    # feel free to comment out this section if not using jekyll diagrams.


# -----------------------------------------------------------------------------
# 16. Optional Features
# -----------------------------------------------------------------------------
# Toggle site features on (true) or off (false) without touching any other files.

enable_google_analytics:    true  # enables google analytics
enable_panelbear_analytics: false  # enables panelbear analytics
enable_google_verification: true  # enables google site verification
enable_bing_verification:   true  # enables bing site verification
enable_masonry:             true   # enables automatic project cards arangement
enable_math:                true   # enables math typesetting (uses MathJax)
enable_tooltips:            true  # enables automatic tooltip links generated
                                   # for each section titles on pages and posts
enable_darkmode:            true   # enables switching between light/dark modes
enable_navbar_social:       true  # enables displaying social links in the
                                   # navbar on the about page
enable_project_categories:  true   # enables categorization of projects into
                                   # multiple categories
enable_medium_zoom:         true   # enables image zoom feature (as on medium.com)


