<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Memories admin</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem;
      line-height: 1.4;
    }
    h1 { font-size: 1.4rem; }
    h2 { font-size: 1.1rem; margin-top: 2rem; }
    .card {
      border: 1px solid #8884;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .card img { max-width: 160px; max-height: 120px; object-fit: cover; border-radius: 4px; display: block; margin-bottom: .5rem; }
    label { display: block; font-size: .8rem; font-weight: 600; margin-top: .6rem; }
    input[type=text], input[type=date], textarea, select {
      width: 100%;
      box-sizing: border-box;
      padding: .4rem;
      font-size: .95rem;
      margin-top: .2rem;
    }
    textarea { min-height: 3.5rem; }
    button {
      cursor: pointer;
      padding: .5rem 1rem;
      border-radius: 6px;
      border: 1px solid #8884;
      background: #2563eb;
      color: white;
      font-weight: 600;
    }
    button.secondary { background: transparent; color: inherit; }
    button.danger { background: #b91c1c; }
    .row { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; margin-top: .75rem; }
    #status { margin: 1rem 0; padding: .6rem 1rem; border-radius: 6px; display: none; }
    #status.ok { display: block; background: #16a34a22; border: 1px solid #16a34a; }
    #status.err { display: block; background: #b91c1c22; border: 1px solid #b91c1c; }
    #gate { max-width: 400px; margin: 4rem auto; text-align: center; }
    #app { display: none; }
  </style>
</head>
<body>

  <div id="gate">
    <h1>Memories admin</h1>
    <p>Enter the admin password to edit photos and captions.</p>
    <input type="text" id="passwordInput" placeholder="Password" style="width:100%; padding:.6rem;" />
    <div class="row" style="justify-content:center;">
      <button id="unlockBtn">Unlock</button>
    </div>
  </div>

  <div id="app">
    <h1>Memories admin</h1>
    <p><a href="/memories/">View the live Memories page →</a></p>
    <div id="status"></div>

    <h2>Existing memories</h2>
    <div id="list"></div>

    <h2>Add a new memory</h2>
    <div class="card" id="newCard"></div>

    <div class="row">
      <button id="saveBtn">Save all changes</button>
      <span id="saveHint" style="font-size:.85rem; opacity:.7;"></span>
    </div>
  </div>

  <script>
    // Fill this in after deploying the Firebase Function (see admin-api/README.md).
    const FUNCTION_BASE = "https://us-central1-personal-website-e7699.cloudfunctions.net/memoriesAdmin";

    const gate = document.getElementById("gate");
    const app = document.getElementById("app");
    const listEl = document.getElementById("list");
    const newCardEl = document.getElementById("newCard");
    const statusEl = document.getElementById("status");

    let password = sessionStorage.getItem("memoriesAdminPassword") || "";
    let memories = [];
    let sha = null;
    let pendingUploads = []; // { index: number|"new", file: File }
    let newEntryImagePreview = null;

    document.getElementById("unlockBtn").addEventListener("click", () => {
      password = document.getElementById("passwordInput").value;
      sessionStorage.setItem("memoriesAdminPassword", password);
      loadMemories();
    });

    function showStatus(kind, message) {
      statusEl.className = kind;
      statusEl.textContent = message;
    }

    async function loadMemories() {
      try {
        const res = await fetch(`${FUNCTION_BASE}/memories`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Failed to load memories.");
        memories = data.memories;
        sha = data.sha;
        gate.style.display = "none";
        app.style.display = "block";
        render();
      } catch (err) {
        alert("Couldn't load memories: " + err.message + "\n\nCheck that FUNCTION_BASE in this page is set correctly.");
      }
    }

    function render() {
      listEl.innerHTML = "";
      memories.forEach((memory, index) => {
        listEl.appendChild(renderCard(memory, index));
      });
      newCardEl.innerHTML = "";
      newCardEl.appendChild(renderCard({ title: "", description: "", date: "", tags: [], type: "photo", image: "" }, "new"));
    }

    function renderCard(memory, index) {
      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.src = memory.image ? memory.image : "";
      img.style.display = memory.image ? "block" : "none";
      img.onerror = () => { img.style.display = "none"; };
      card.appendChild(img);

      card.appendChild(field("Title", "text", memory.title, v => memory.title = v));
      card.appendChild(field("Description", "textarea", memory.description, v => memory.description = v));
      card.appendChild(field("Date", "date", memory.date, v => memory.date = v));
      card.appendChild(field("Tags (comma separated)", "text", (memory.tags || []).join(", "), v => {
        memory.tags = v.split(",").map(t => t.trim()).filter(Boolean);
      }));

      const typeLabel = document.createElement("label");
      typeLabel.textContent = "Type";
      card.appendChild(typeLabel);
      const typeSelect = document.createElement("select");
      ["photo", "video"].forEach(opt => {
        const o = document.createElement("option");
        o.value = opt; o.textContent = opt;
        if ((memory.type || "photo") === opt) o.selected = true;
        typeSelect.appendChild(o);
      });
      typeSelect.addEventListener("change", () => memory.type = typeSelect.value);
      card.appendChild(typeSelect);

      card.appendChild(field("Video embed URL (only for videos)", "text", memory.video || "", v => memory.video = v));

      const fileLabel = document.createElement("label");
      fileLabel.textContent = index === "new" ? "Photo" : "Replace photo (optional)";
      card.appendChild(fileLabel);
      const fileInput = document.createElement("input");
      fileInput.type = "file";
      fileInput.accept = "image/*";
      fileInput.addEventListener("change", () => {
        if (fileInput.files[0]) {
          pendingUploads = pendingUploads.filter(u => u.index !== index);
          pendingUploads.push({ index, file: fileInput.files[0] });
        }
      });
      card.appendChild(fileInput);

      const row = document.createElement("div");
      row.className = "row";
      if (index === "new") {
        const addBtn = document.createElement("button");
        addBtn.textContent = "Add to list";
        addBtn.addEventListener("click", () => {
          if (!memory.title) { alert("Give the new memory a title first."); return; }
          memories.push(memory);
          const upload = pendingUploads.find(u => u.index === "new");
          if (upload) {
            pendingUploads = pendingUploads.filter(u => u.index !== "new");
            pendingUploads.push({ index: memories.length - 1, file: upload.file });
          }
          render();
        });
        row.appendChild(addBtn);
      } else {
        const delBtn = document.createElement("button");
        delBtn.className = "danger";
        delBtn.textContent = "Delete";
        delBtn.addEventListener("click", () => {
          if (confirm(`Delete "${memory.title}"?`)) {
            memories.splice(index, 1);
            render();
          }
        });
        row.appendChild(delBtn);
      }
      card.appendChild(row);

      return card;
    }

    function field(labelText, type, value, onChange) {
      const wrapper = document.createElement("div");
      const label = document.createElement("label");
      label.textContent = labelText;
      wrapper.appendChild(label);
      const input = document.createElement(type === "textarea" ? "textarea" : "input");
      if (type !== "textarea") input.type = type;
      input.value = value || "";
      input.addEventListener("input", () => onChange(input.value));
      wrapper.appendChild(input);
      return wrapper;
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    document.getElementById("saveBtn").addEventListener("click", async () => {
      showStatus("ok", "Saving…");
      try {
        for (const upload of pendingUploads) {
          const contentBase64 = await fileToBase64(upload.file);
          const res = await fetch(`${FUNCTION_BASE}/upload-image`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password, filename: upload.file.name, contentBase64 }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Photo upload failed.");
          memories[upload.index].image = data.path;
        }
        pendingUploads = [];

        const res = await fetch(`${FUNCTION_BASE}/memories`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password, sha, memories }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Save failed.");
        sha = data.sha;
        showStatus("ok", "Saved! The site will rebuild in a minute or two.");
        render();
      } catch (err) {
        showStatus("err", "Error: " + err.message);
      }
    });

    if (password) loadMemories();
  </script>
</body>
</html>
